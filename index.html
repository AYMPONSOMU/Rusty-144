<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYMPON COSMIC - Rusty's Attack</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>

<script>
// Game Configuration
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth > 500 ? 450 : window.innerWidth, // Perfect for Mobile
    height: window.innerHeight,
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 0 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let rusty;
let cosmicHand;
let fireSparks;
let score = 0;
let scoreText;
let currentStage = 1;
let stageText;
let spawnTimer;

function preload() {
    // Fixed paths for GitHub Pages compatibility
    this.load.image('background', 'images/cosmic-bg.png'); 
    this.load.image('rusty', 'images/rusty.png'); 
    this.load.image('hand', 'images/hand.png'); 
    this.load.image('spark', 'images/spark.png'); 
}

function create() {
    // Responsive Background
    let bg = this.add.image(config.width/2, config.height/2, 'background');
    bg.setDisplaySize(config.width, config.height);

    // Rusty Character at the top
    rusty = this.add.image(config.width / 2, 120, 'rusty');
    rusty.setDisplaySize(160, 160);

    // Cosmic Hand at the bottom
    cosmicHand = this.physics.add.sprite(config.width / 2, config.height - 100, 'hand');
    cosmicHand.setCollideWorldBounds(true);
    cosmicHand.setDisplaySize(90, 90);
    cosmicHand.setImmovable(true);

    // Smooth Mobile Touch Controls
    this.input.on('pointermove', function (pointer) {
        cosmicHand.x = Phaser.Math.Clamp(pointer.x, 45, config.width - 45);
    });

    // Sparks Group
    fireSparks = this.physics.add.group();

    // Set Stage Difficulty
    setStageDifficulty.call(this);

    // English Score & Stage UI
    scoreText = this.add.text(20, 20, '⚡ Score: 0', { fontSize: '22px', fill: '#00ffff', fontFamily: 'Arial', fontWeight: 'bold', stroke: '#000', strokeThickness: 4 });
    stageText = this.add.text(config.width - 160, 20, '🪐 Stage: 1/12', { fontSize: '22px', fill: '#ffd700', fontFamily: 'Arial', fontWeight: 'bold', stroke: '#000', strokeThickness: 4 });

    // Collision Setup
    this.physics.add.overlap(cosmicHand, fireSparks, destroySpark, null, this);
}

function update() {
    // Check for missed sparks
    fireSparks.getChildren().forEach(spark => {
        if (spark.y > config.height + 20) {
            spark.destroy();
            gameOver.call(this); // Trigger Game Over if missed
        }
    });
}

function dropSpark() {
    // Spark spawns from Rusty's current position
    let spark = fireSparks.create(rusty.x, 150, 'spark');
    spark.setDisplaySize(25, 25);
    
    // Speed increases as stages progress
    let speed = 400 + (currentStage * 35); 
    spark.setVelocityY(speed);
    
    // From Stage 2 onwards, Rusty moves randomly to make it challenging
    if (currentStage >= 2) {
        rusty.x = Phaser.Math.Between(80, config.width - 80);
    }
}

function destroySpark(hand, spark) {
    spark.destroy();
    score += 10;
    scoreText.setText('⚡ Score: ' + score);

    // Advance stage every 100 points
    if (score % 100 === 0 && currentStage < 12) {
        currentStage++;
        stageText.setText('🪐 Stage: ' + currentStage + '/12');
        setStageDifficulty.call(this);
    } else if (score >= 1200 && currentStage === 12) {
        // Ultimate Victory Notification in English
        this.scene.pause();
        alert("🎉 Congratulations! You have cleared all 12 Cosmic Stages. Get ready to claim your $AYMP Tokens!");
        window.location.href = "claim-token.html"; 
    }
}

function setStageDifficulty() {
    if (spawnTimer) spawnTimer.destroy();
    
    // Decreasing delay makes sparks spawn faster
    let delay = Math.max(1200 - (currentStage * 80), 300); 
    spawnTimer = this.time.addEvent({
        delay: delay,
        callback: dropSpark,
        callbackScope: this,
        loop: true
    });
}

function gameOver() {
    // English Game Over Notification
    alert("❌ Spark Missed! Restarting this stage from the beginning.");
    score = (currentStage - 1) * 100; // Reset score to the beginning of current stage
    scoreText.setText('⚡ Score: ' + score);
    this.scene.restart();
}
</script>

</body>
</html>
