<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYMPON COSMIC - Rusty 144</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
</head>
<body>

<script>
    const config = {
        type: Phaser.AUTO,
        width: 450,
        height: 800,
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 0 }, // தனித்தனியாக வேகம் தருவதால் உலகளாவிய கிராவிட்டி 0
                debug: false
            }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    const game = new Phaser.Game(config);

    let playerHand;
    let sparks;
    let cursors;
    let score = 0;
    let scoreText;
    let spawnTimer;

    function preload() {
        // உங்கள் இமேஜ் கோப்புகள்
        this.load.image('background', 'images/cosmic-bg.png');
        this.load.image('hand', 'images/hand.png');
        this.load.image('spark', 'images/spark.png');
    }

    function create() {
        // பின்னணி இமேஜ் (காஷ்மீர் + காஸ்மிக் பேக்ரவுண்ட்)
        let bg = this.add.image(225, 400, 'background');
        bg.setDisplaySize(450, 800);

        // பிளேயர் கை (விளையாடுபவர் கட்டுப்படுத்தும் காஸ்மிக் கை)
        playerHand = this.physics.add.sprite(225, 700, 'hand');
        playerHand.setCollideWorldBounds(true);
        playerHand.setDisplaySize(100, 100);
        playerHand.setImmovable(true);

        // தீப்பொறிகளுக்கான குரூப் (Sparks Group)
        sparks = this.physics.add.group();

        // தீப்பொறிகளை மாறி மாறி வெவ்வேறு இடங்களில் வேகமாக உருவாக்க டைமர் (350 மில்லிசெகண்ட்ஸ் - அதிவேகம்)
        spawnTimer = this.time.addEvent({
            delay: 350, 
            callback: addSpark,
            callbackScope: this,
            loop: true
        });

        // மொபைல் டச் மற்றும் கீபோர்டு கன்ட்ரோல்
        cursors = this.input.keyboard.createCursorKeys();
        
        // மொபைல் டச் கன்ட்ரோல் (கை விரலை நகர்த்தும் இடத்திற்கு பிளேயர் கை மாறும்)
        this.input.on('pointermove', function (pointer) {
            playerHand.x = Phaser.Math.Clamp(pointer.x, 50, 400);
        });

        // ஸ்கோர் டெக்ஸ்ட்
        scoreText = this.add.text(16, 16, 'Score: 0', { fontSize: '24px', fill: '#fff', fontFamily: 'Arial' });

        // கையும் தீப்பொறியும் மோதும் போது நடக்கும் நிகழ்வு (Overlap)
        this.physics.add.overlap(playerHand, sparks, collectSpark, null, this);
    }

    function update() {
        // கீபோர்டு கன்ட்ரோல் (கம்ப்யூட்டரில் சோதிக்க)
        if (cursors.left.isDown) {
            playerHand.setVelocityX(-350);
        } else if (cursors.right.isDown) {
            playerHand.setVelocityX(350);
        } else {
            playerHand.setVelocityX(0);
        }

        // ஸ்கிரீனை விட்டு கீழே போகும் தீப்பொறிகளை அழித்தல்
        sparks.getChildren().forEach(function(spark) {
            if (spark.y > 850) {
                spark.destroy();
            }
        });
    }

    // தீப்பொறிகளை வெவ்வேறு இடங்களில் உருவாக்கும் ஃபங்க்ஷன்
    function addSpark() {
        // எக்ஸ் அச்சு (X-axis) 30 முதல் 420-க்குள் ரேண்டமாக மாறும்
        let randomX = Phaser.Math.Between(30, 420);
        
        // ரஷ்டி உருவத்தின் கைகள் இருக்கும் பகுதியிலிருந்து (y: 200) பொறிகள் கிளம்பும்
        let spark = sparks.create(randomX, 200, 'spark');
        spark.setDisplaySize(30, 30);
        
        // தீப்பொறியின் வேகம் (400 முதல் 650 வரை ரேண்டம் அதிவேகம்)
        let randomVelocity = Phaser.Math.Between(400, 650);
        spark.setVelocityY(randomVelocity);
    }

    // கை தீப்பொறியைத் தடுக்கும் போது ஸ்கோர் ஏறும் ஃபங்க்ஷன்
    function collectSpark(hand, spark) {
        spark.destroy(); // தீப்பொறி அழியும்
        score += 10;     // 10 புள்ளிகள் கூடும்
        scoreText.setText('Score: ' + score);
    }
</script>

</body>
</html>
