<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYMPON COSMIC - Rusty's Attack</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>

<script>
// கேம் செட்டிங்ஸ்
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth > 500 ? 450 : window.innerWidth, // மொபைலுக்கு ஏற்ற அளவு
    height: window.innerHeight,
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 0 }, debug: false } // நெருப்பு பொறிகள் விழ இயற்பியல் விதி
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let rusty;
let cosmicHand;
let fireSparks;
let score = 0;
let scoreText;
let currentStage = 1;
let stageText;
let spawnTimer;

function preload() {
    // 1. உங்கள் படங்களின் சரியான பாதையை (Path) இங்கே கொடுக்கவும்
    this.load.image('background', './images/cosmic-bg.png'); 
    this.load.image('rusty', './images/rusty.png'); // ரஷ்டி உருவம்
    this.load.image('hand', './images/hand.png'); // கீழே உள்ள கை
    this.load.image('spark', './images/spark.png'); // நெருப்புப் பொறி
}

function create() {
    // பின்னணி
    this.add.image(config.width/2, config.height/2, 'background').setDisplaySize(config.width, config.height);

    // ரஷ்டி (மேலே இருப்பார்)
    rusty = this.physics.add.sprite(config.width / 2, 80, 'rusty').setScale(0.15);
    rusty.setImmovable(true);

    // காஸ்மிக் கை (கீழே இருக்கும் - நகர்த்த முடியும்)
    cosmicHand = this.physics.add.sprite(config.width / 2, config.height - 100, 'hand').setScale(0.2);
    cosmicHand.setCollideWorldBounds(true);

    // கையை மௌஸ் அல்லது தொடுதல் (Touch) மூலம் நகர்த்த
    this.input.on('pointermove', function (pointer) {
        cosmicHand.x = pointer.x;
    });

    // நெருப்புப் பொறிகள் குரூப்
    fireSparks = this.physics.add.group();

    // குறிப்பிட்ட நேரத்திற்கு ஒருமுறை நெருப்புப் பொறிகளை ரஷ்டி வெளியிடுவார்
    setStageDifficulty.call(this);

    // ஸ்கோர் மற்றும் ஸ்டேஜ் விபரம்
    scoreText = this.add.text(20, 20, '⚡ Score: 0', { fontSize: '20px', fill: '#00ffff', fontFamily: 'Arial' });
    stageText = this.add.text(config.width - 150, 20, '🪐 Stage: 1/12', { fontSize: '20px', fill: '#ffd700', fontFamily: 'Arial' });

    // கொலிஷன் (Collision) - கை நெருப்புப் பொறிகளை அழித்தால் பாய்ண்ட்
    this.physics.add.overlap(cosmicHand, fireSparks, destroySpark, null, this);
}

function update() {
    // நெருப்புப் பொறிகள் கையைத் தாண்டி கீழே விழுந்தால் (Miss ஆனால்) - கேம் ஓவர் / ரீஸ்டார்ட்
    fireSparks.getChildren().forEach(spark => {
        if (spark.y > config.height) {
            spark.destroy();
            gameOver.call(this); // மிஸ்ஸானால் மீண்டும் கேம் ஸ்டேஜ் ஆரம்பம்
        }
    });
}

// நெருப்புப் பொறிகளை உருவாக்கும் பங்க்ஷன்
function dropSpark() {
    // ரஷ்டி இருக்கும் இடத்திலிருந்து நெருப்புப் பொறி கிளம்பும்
    let spark = fireSparks.create(rusty.x, rusty.y + 30, 'spark').setScale(0.08);
    
    // நிலைக்கு (Stage) தகுந்தாற்போல் வேகம் மாறும்
    let speed = 200 + (currentStage * 40); 
    spark.setVelocityY(speed);
    
    // 8-வது நிலைக்கு மேல் ரஷ்டி அங்கும் இங்கும் நகர்வார் (தடை கடினமாகும்)
    if (currentStage >= 8) {
        rusty.x = Phaser.Math.Between(50, config.width - 50);
    }
}

// கையில் பட்டு நெருப்புப் பொறி அழிந்தால்
function destroySpark(hand, spark) {
    spark.destroy();
    score += 10;
    scoreText.setText('⚡ Score: ' + score);

    // ஒவ்வொரு 100 பாய்ண்ட்டுக்கும் அடுத்த ஸ்டேஜ் (12 நிலைகள் வரை)
    if (score % 100 === 0 && currentStage < 12) {
        currentStage++;
        stageText.setText('🪐 Stage: ' + currentStage + '/12');
        setStageDifficulty.call(this);
    } else if (score >= 1200 && currentStage === 12) {
        // 12 நிலைகளையும் கடந்தால் AYMP Token ரிவார்டு பக்கம் செல்லும்
        this.scene.pause();
        alert("🎉 அற்புதம்! 12 படிகளையும் கடந்துவிட்டீர்கள். உங்கள் $AYMP Token Claim செய்ய தயாராகுங்கள்!");
        window.location.href = "claim-token.html"; // டோக்கன் ரிவார்டு பக்கம்
    }
}

// ஸ்டேஜிற்கு ஏற்ப நெருப்புப் பொறிகள் வரும் வேகத்தை மாற்றுதல்
function setStageDifficulty() {
    if (spawnTimer) spawnTimer.destroy();
    
    let delay = Math.max(1500 - (currentStage * 100), 400); // போகப் போக வேகமாக பொறிகள் வரும்
    spawnTimer = this.time.addEvent({
        delay: delay,
        callback: dropSpark,
        callbackScope: this,
        loop: true
    });
}

// மிஸ்ஸானால் மீண்டும் அதே ஸ்டேஜ் ஆரம்பம்
function gameOver() {
    alert("❌ நெருப்புப் பொறி தப்பியது! மீண்டும் இந்த ஸ்டேஜ் ஆரம்பத்திலிருந்து தொடங்குகிறது.");
    score = (currentStage - 1) * 100; // அந்த ஸ்டேஜின் ஆரம்ப ஸ்கோருக்கு கொண்டு செல்லுதல்
    scoreText.setText('⚡ Score: ' + score);
    this.scene.restart();
}
</script>

</body>
</html>
